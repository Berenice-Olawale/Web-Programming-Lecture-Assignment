<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web programming-1 Lecture Homework</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        header {
            background: linear-gradient(135deg, #1f2937, #2563eb);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        header p {
            margin-top: 10px;
            opacity: 0.8;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 50px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #1f2937;
        }

        .card a {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            display: inline-block;
            transition: 0.3s;
        }

        .card a:hover {
            background: #1e40af;
        }

        footer {
            background: #1f2937;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        footer p {
            margin: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Web programming-1 Lecture Homework</h1>
    </header>

    <div class="container">

    <div class="card">
        <h3>JavaScript CRUD</h3>
        <a href="javascript.html">Open</a>
    </div>

    <div class="card">
        <h3>React CRUD</h3>
        <a href="react.html">Open</a>
    </div>

    <div class="card">
        <h3>SPA Applications</h3>
        <a href="./SPA/dist/index.html">Open</a>
    </div>

    <div class="card">
        <h3>Fetch API</h3>
        <a href="fetchapi.html">Open</a>
    </div>

    <div class="card">
        <h3>Axios React</h3>
        <a href="./axios-menu/dist/index.html">Open</a>
    </div>

    <div class="card">
        <h3>OO JavaScript</h3>
        <a href="oojs.html">Open</a>
    </div>

</div>
    <footer>
        <p>Berenice Olawale - I4G9NE</p>
        <p>Meriem Ben Zouitine - EA6MCH</p>
    </footer>
</body>
</html>
