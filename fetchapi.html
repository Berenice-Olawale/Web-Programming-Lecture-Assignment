<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Notebook CRUD Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 48px;
        }

        hr {
            border: none;
            border-top: 1px solid #dbe3ec;
            margin-bottom: 30px;
        }

        .form-card {
            background: white;

        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .button-row {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 16px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #0284c7;
        }

        .table-card {
            background: white;
            border-radius: 14px;
            overflow-x: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            margin: 0 auto;
            width: 90%;
            max-width: 1400px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1e293b;
            color: white;
            padding: 14px 10px;
            text-align: left;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f8fafc;
        }

        .action-btn {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <h1>Fetch API Notebook CRUD Application</h1>
    <hr>

    <div class="form-card">
        <form onsubmit="event.preventDefault(); onSubmit();">
            <div class="form-grid">
                <input id="manufacturer" placeholder="Manufacturer">
                <input id="type" placeholder="Type">

                <input id="display" placeholder="Display" class="full-width">
                <input id="memory" placeholder="Memory" class="full-width">
                <input id="harddisk" placeholder="Hard Disk" class="full-width">
                <input id="videocontroller" placeholder="Video Controller" class="full-width">
                <input id="price" placeholder="Price" class="full-width">
                <input id="processorid" placeholder="Processor ID" class="full-width">
                <input id="opsystemid" placeholder="OS ID" class="full-width">
                <input id="pieces" placeholder="Pieces" class="full-width">

                <div class="button-row">
                    <button type="submit" id="submitBtn">Add Notebook</button>
                    <button type="button" onclick="clearForm()">Clear</button>
                </div>
            </div>
        </form>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Manufacturer</th>
                    <th>Type</th>
                    <th>Display</th>
                    <th>Memory</th>
                    <th>Disk</th>
                    <th>Video</th>
                    <th>Price</th>
                    <th>Processor</th>
                    <th>OS</th>
                    <th>Pieces</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let notebooks = [];
        let selectedId = null;

        function loadData() {
            fetch("./notebooks.json")
                .then(res => res.json())
                .then(data => {
                    notebooks = data;
                    displayData();
                })
                .catch(err => console.error("Error loading notebooks:", err));
        }

        function displayData() {
            const table = document.getElementById("tableBody");
            table.innerHTML = "";

            notebooks.forEach(item => {
                const row = table.insertRow();

                row.innerHTML = `
                    <td>${item.manufacturer}</td>
                    <td>${item.type}</td>
                    <td>${item.display}</td>
                    <td>${item.memory}</td>
                    <td>${item.harddisk}</td>
                    <td>${item.videocontroller}</td>
                    <td>${item.price}</td>
                    <td>${item.processorid}</td>
                    <td>${item.opsystemid}</td>
                    <td>${item.pieces}</td>
                    <td>
                        <button class="action-btn" onclick="editData('${item.id}')">Edit</button>
                        <button onclick="deleteData('${item.id}')">Delete</button>
                    </td>
                `;
            });
        }

        function onSubmit() {
            const data = {
                manufacturer: document.getElementById("manufacturer").value,
                type: document.getElementById("type").value,
                display: document.getElementById("display").value,
                memory: document.getElementById("memory").value,
                harddisk: document.getElementById("harddisk").value,
                videocontroller: document.getElementById("videocontroller").value,
                price: document.getElementById("price").value,
                processorid: document.getElementById("processorid").value,
                opsystemid: document.getElementById("opsystemid").value,
                pieces: document.getElementById("pieces").value
            };

            if (data.manufacturer.trim() === "") {
                alert("Manufacturer is required");
                return;
            }

            if (selectedId === null) {
                data.id = Date.now().toString();
                notebooks.push(data);
            } else {
                notebooks = notebooks.map(item =>
                    item.id === selectedId ? { ...data, id: selectedId } : item
                );
                selectedId = null;
                document.getElementById("submitBtn").textContent = "Add Notebook";
            }

            displayData();
            document.querySelector("form").reset();
        }

        function editData(id) {
            const data = notebooks.find(item => item.id === id);

            document.getElementById("manufacturer").value = data.manufacturer;
            document.getElementById("type").value = data.type;
            document.getElementById("display").value = data.display;
            document.getElementById("memory").value = data.memory;
            document.getElementById("harddisk").value = data.harddisk;
            document.getElementById("videocontroller").value = data.videocontroller;
            document.getElementById("price").value = data.price;
            document.getElementById("processorid").value = data.processorid;
            document.getElementById("opsystemid").value = data.opsystemid;
            document.getElementById("pieces").value = data.pieces;

            selectedId = id;
            document.getElementById("submitBtn").textContent = "Update Notebook";
        }

        function deleteData(id) {
            notebooks = notebooks.filter(item => item.id !== id);
            displayData();
        }

        function clearForm() {
            document.querySelector("form").reset();
            selectedId = null;
            document.getElementById("submitBtn").textContent = "Add Notebook";
        }

        loadData();
    </script>
</body>
</html>
