<!DOCTYPE html>
<html>
<head>
    <title>React Notebook CRUD</title>
    <link rel="stylesheet" href="style2.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

<h1><center>React Notebook CRUD Application</center></h1>

<div id="root"></div>

<script type="text/babel">

function App() {

    const [notebooks, setNotebooks] = React.useState([]);
    const [formData, setFormData] = React.useState({
        manufacturer: "",
        type: "",
        display: "",
        memory: "",
        harddisk: "",
        videocontroller: "",
        price: "",
        processorid: "",
        opsystemid: "",
        pieces: ""
    });

    const [selectedIndex, setSelectedIndex] = React.useState(null);

    function handleChange(e) {
        setFormData({
            ...formData,
            [e.target.name]: e.target.value
        });
    }

    function handleSubmit(e) {
        e.preventDefault();

        if (formData.manufacturer === "") {
            alert("Manufacturer is required!");
            return;
        }

        if (selectedIndex === null) {
            setNotebooks([...notebooks, formData]);
        } else {
            let updated = [...notebooks];
            updated[selectedIndex] = formData;
            setNotebooks(updated);
            setSelectedIndex(null);
        }

        resetForm();
    }

    function resetForm() {
        setFormData({
            manufacturer: "",
            type: "",
            display: "",
            memory: "",
            harddisk: "",
            videocontroller: "",
            price: "",
            processorid: "",
            opsystemid: "",
            pieces: ""
        });
    }

    function onEdit(index) {
        setFormData(notebooks[index]);
        setSelectedIndex(index);
    }

    function onDelete(index) {
        if (confirm("Are you sure?")) {
            const updated = notebooks.filter((_, i) => i !== index);
            setNotebooks(updated);
        }
    }

    return (
        <div>
            <div className="notebook-form">
                <form onSubmit={handleSubmit}>

                    <input name="manufacturer" placeholder="Manufacturer" value={formData.manufacturer} onChange={handleChange} />
                    <input name="type" placeholder="Type" value={formData.type} onChange={handleChange} />
                    <input name="display" type="number" placeholder="Display" value={formData.display} onChange={handleChange} />
                    <input name="memory" type="number" placeholder="Memory" value={formData.memory} onChange={handleChange} />
                    <input name="harddisk" type="number" placeholder="Hard Disk" value={formData.harddisk} onChange={handleChange} />
                    <input name="videocontroller" placeholder="Video Controller" value={formData.videocontroller} onChange={handleChange} />
                    <input name="price" type="number" placeholder="Price" value={formData.price} onChange={handleChange} />
                    <input name="processorid" type="number" placeholder="Processor ID" value={formData.processorid} onChange={handleChange} />
                    <input name="opsystemid" type="number" placeholder="OS ID" value={formData.opsystemid} onChange={handleChange} />
                    <input name="pieces" type="number" placeholder="Pieces" value={formData.pieces} onChange={handleChange} />

                    <div className="form-action-buttons">
                        <input type="submit" value="Submit" />
                    </div>

                </form>
            </div>

            <br />
            <div className="notebook-table">
                <table className="list">

                    <thead>
                        <tr>
                            <th>Manufacturer</th>
                            <th>Type</th>
                            <th>Display</th>
                            <th>Memory</th>
                            <th>Disk</th>
                            <th>Video</th>
                            <th>Price</th>
                            <th>Processor</th>
                            <th>OS</th>
                            <th>Pieces</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        {notebooks.map((item, index) => (
                            <tr key={index}>
                                <td>{item.manufacturer}</td>
                                <td>{item.type}</td>
                                <td>{item.display}</td>
                                <td>{item.memory}</td>
                                <td>{item.harddisk}</td>
                                <td>{item.videocontroller}</td>
                                <td>{item.price}</td>
                                <td>{item.processorid}</td>
                                <td>{item.opsystemid}</td>
                                <td>{item.pieces}</td>
                                <td>
                                    <button onClick={() => onEdit(index)}>Edit</button>
                                    <button onClick={() => onDelete(index)}>Delete</button>
                                </td>
                            </tr>
                        ))}
                    </tbody>

                </table>
            </div>

        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
