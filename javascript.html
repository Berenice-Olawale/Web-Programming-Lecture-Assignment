<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Notebook CRUD Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>JavaScript Notebook CRUD Application</h1>
    <hr>

    <div class="notebook-form">
        <form onsubmit="event.preventDefault();onFormSubmit();">

            <div>
                <label>Manufacturer*</label>
                <label class="validation-error hide" id="ManufacturerValidationError">
                    This field is required.
                </label>
                <input type="text" name="Manufacturer" id="Manufacturer">
            </div>

            <div>
                <label>Type</label>
                <input type="text" name="Type" id="Type">
            </div>

            <div>
                <label>Display</label>
                <input type="number" name="Display" id="Display">
            </div>

            <div>
                <label>Memory (MIB)</label>
                <input type="number" name="Memory" id="Memory">
            </div>

            <div>
                <label>Hard Disk (GB)</label>
                <input type="number" name="Harddisk" id="Harddisk">
            </div>

            <div>
                <label>Video Controller</label>
                <input type="text" name="VideoController" id="VideoController">
            </div>

            <div>
                <label>Price (£)</label>
                <input type="number" name="Price" id="Price">
            </div>

            <div>
                <label>Processor ID</label>
                <input type="number" name="ProcessorID" id="ProcessorID">
            </div>

            <div>
                <label>OS ID</label>
                <input type="number" name="OSID" id="OSID">
            </div>

            <div>
                <label>Pieces in Stock</label>
                <input type="number" name="Pieces" id="Pieces">
            </div>

            <div class="form-action">
                <input type="submit" value="Submit">
            </div>

        </form>
    </div>

    <div class="notebook-table">
        <table class="list" id="notebookList">
            <thead>
                <tr>
                    <th>Manufacturer</th>
                    <th>Type</th>
                    <th>Display</th>
                    <th>Memory (MIB)</th>
                    <th>Hard Disk (GB)</th>
                    <th>Video Controller</th>
                    <th>Price (£)</th>
                    <th>Processor ID</th>
                    <th>OS ID</th>
                    <th>Pieces in Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>

</body>
</html>
